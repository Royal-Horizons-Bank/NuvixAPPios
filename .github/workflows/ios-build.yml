name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        # Raw output here so you can see any specific library errors in the console
        run: |
          cd ios
          xcodebuild archive \
            -workspace Nuvixapp.xcworkspace \
            -scheme Nuvixapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_COMPILATION_MODE=wholemodule

      - name: Package into .ipa
        if: always()
        run: |
          mkdir -p Payload
          # The "Search and Rescue" command
          # Scans the entire workspace for the .app folder created by the build
          APP_PATH=$(find . -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Direct search failed. Trying global fallback..."
            APP_PATH=$(find . -name "Nuvixapp.app" -type d | grep -v "Pods" | head -n 1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "SUCCESS: Found app at $APP_PATH"
            cp -R "$APP_PATH" Payload/
            zip -r Nuvixapp_unsigned.ipa Payload
          else
            echo "CRITICAL FAILURE: No .app file was created. Check the Build Archive logs above."
            exit 1
          fi

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nuvixapp-Final-IPA
          path: Nuvixapp_unsigned.ipa