name: iOS Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Dependencies
        run: npm install

      - name: Prebuild iOS Folder
        # Using --no-install to allow for Podfile patching before running pod install
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile for Xcode 16 & Performance
        run: |
          # This script injects performance and compatibility settings into the Podfile
          sed -i '' "s/post_install do |installer|/post_install do |installer|\\
            installer.pods_project.targets.each do |target|\\
              target.build_configurations.each do |config|\\
                config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'\\
                config.build_settings['COMPILER_INDEX_STORE_ENABLE'] = 'NO'\\
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'\\
                config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'\\
              end\\
            end/" ios/Podfile

      - name: Install CocoaPods
        # Generates the Nuvix.xcworkspace file required for the build 
        run: |
          cd ios
          pod install

      - name: Run Fastlane Build
        run: bundle exec fastlane build_sideload
        env:
          CI: true
          NODE_ENV: production
          # Limits parallel jobs to prevent runner memory exhaustion
          MAX_PARALLEL_CODE_SIGN_JOBS: 1

      - name: Find and Stage App Bundle
        run: |
          mkdir -p build-output
          # Locates the .app folder created during the archive process
          find ~/Library/Developer/Xcode/Archives -name "*.app" -type d -exec cp -R {} ./build-output/ \;
          
          echo "Verifying build output contents..."
          ls -R build-output

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-App-Bundle
          path: build-output/
        
      - name: Print Xcode Build Log on Failure
        if: failure()
        run: |
          echo "🚨 DUMPING XCODE BUILD LOG 🚨"
          # Prints the last 250 lines of the actual build log
          tail -n 250 /Users/runner/Library/Logs/gym/Nuvix-Nuvix.log