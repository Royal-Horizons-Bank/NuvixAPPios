name: iOS Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true 

      - name: Install Dependencies
        run: npm install

      - name: Prebuild iOS Folder
        run: npx expo prebuild --platform ios
        env:
          CI: true

      - name: Fix Expo Constants
        run: npx expo export --platform ios
        env:
          CI: true

      - name: Run Fastlane Build
        run: bundle exec fastlane build_app_bundle
        env:
          CI: true
          NODE_ENV: production

      - name: Stage and Zip App Bundle
        run: |
          # 1. Find the compiled .app in the derived_data folder
          APP_PATH=$(find ./derived_data -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app bundle in derived_data"
            exit 1
          fi
          
          # 2. Create output directory and copy
          mkdir -p ./output/Payload
          cp -R "$APP_PATH" ./output/Payload/Nuvix+.app
          
          # 3. Zip it (Standard for sideloading/Windows transfer)
          cd output
          zip -r Nuvix-Plus-Build.zip Payload/
          cd ..
          
          echo "Build staged and zipped at ./output/Nuvix-Plus-Build.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-Plus-Sideload-Ready
          path: ./output/Nuvix-Plus-Build.zip

      - name: Upload Error Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: /Users/runner/Library/Logs/gym/