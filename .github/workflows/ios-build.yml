name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        run: |
          cd ios
          # Target 'nuvixapp' specifically
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme nuvixapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate and Package .app
        run: |
          # 1. Create a standard IPA structure
          mkdir -p Payload
          
          # 2. Find the .app folder wherever it was created
          # We search the whole workspace to be safe
          APP_DIR=$(find . -name "*.app" -type d | grep "Release-iphoneos" || find . -name "*.app" -type d | head -n 1)
          
          echo "Found App at: $APP_DIR"
          
          # 3. Copy the found .app into the Payload folder
          cp -R "$APP_DIR" Payload/
          
          # 4. Zip it up (This zip is effectively your IPA)
          zip -r nuvix_unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-Unsigned-Package
          path: nuvix_unsigned.ipa