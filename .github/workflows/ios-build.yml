name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Debug - List generated iOS files
        run: ls -la ios

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Debug - Verify Xcode Scheme
        run: |
          cd ios
          xcodebuild -list -workspace Nuvix.xcworkspace

      - name: Build Unsigned Archive
        run: |
          cd ios
          # Using "Nuvix" because Expo strips the "+" from "Nuvix+"
          xcodebuild clean archive \
            -workspace Nuvix.xcworkspace \
            -scheme Nuvix \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Nuvix.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into .ipa
        run: |
          cd ios/build
          mkdir -p Payload
          cp -R Nuvix.xcarchive/Products/Applications/Nuvix.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-unsigned-ipa
          path: ios/build/app.ipa