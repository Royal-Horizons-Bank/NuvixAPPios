name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive (Detailed Logging)
        run: |
          cd ios
          xcodebuild clean archive \
            -workspace Nuvix.xcworkspace \
            -scheme Nuvix \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Nuvix.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | tee build_output.log | grep -A 5 -B 5 "error:" || true
        # We use 'tee' to save the full log to a file while still showing it in the console.
        # We also grep for "error:" to try and highlight it in the GitHub UI.

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log
          path: ios/build_output.log

      - name: Package into .ipa
        if: success()
        run: |
          cd ios/build
          mkdir -p Payload
          cp -R Nuvix.xcarchive/Products/Applications/Nuvix.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-unsigned-ipa
          path: ios/build/app.ipa