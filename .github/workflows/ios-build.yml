name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard for modern React Native
          bundler-cache: true # Runs 'bundle install' automatically if Gemfile exists

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        run: |
          cd ios
          xcodebuild archive \
            -workspace YourAppName.xcworkspace \
            -scheme YourAppName \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/YourAppName.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into .ipa
        run: |
          cd ios/build
          mkdir -p Payload
          cp -R YourAppName.xcarchive/Products/Applications/YourAppName.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: ios/build/app.ipa