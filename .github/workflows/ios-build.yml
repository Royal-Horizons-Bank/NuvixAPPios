name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        run: |
          cd ios
          # We use 'wholemodule' mode to help React 19 / Reanimated find its headers
          xcodebuild archive \
            -workspace Nuvixapp.xcworkspace \
            -scheme Nuvixapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_COMPILATION_MODE=wholemodule

      - name: Package into .ipa
        if: success()
        run: |
          mkdir -p Payload
          # Search for the .app file inside the archive we just made
          APP_PATH=$(find ios/Nuvixapp.xcarchive -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r Nuvixapp_unsigned.ipa Payload

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nuvixapp-Build
          path: |
            Nuvixapp_unsigned.ipa
            ios/build_output.log