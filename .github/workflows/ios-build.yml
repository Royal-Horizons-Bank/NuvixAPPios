name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        id: xcodebuild
        run: |
          cd ios
          # 'tee' saves the log to xcode_raw.log even if it fails
          xcodebuild clean archive \
            -workspace *.xcworkspace \
            -scheme Nuvix \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO | tee ../xcode_raw.log

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-failure-logs
          path: xcode_raw.log

      - name: Locate and Package .app
        if: success()
        run: |
          mkdir -p final_output/Payload
          APP_PATH=$(find ios/build/Nuvix.xcarchive -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" final_output/Payload/
          cd final_output
          zip -r ../Nuvix_Build.ipa Payload

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-App-Package
          path: Nuvix_Build.ipa