name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        id: xcodebuild
        run: |
          cd ios
          # Use a wildcard for the workspace to avoid naming issues
          xcodebuild clean archive \
            -workspace *.xcworkspace \
            -scheme Nuvix \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Nuvix.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into .ipa
        if: success()
        run: |
          cd ios/build
          mkdir -p Payload
          
          # Use a wildcard (*) to find the .app file inside the archive 
          # and copy it into the Payload folder
          cp -R Nuvix.xcarchive/Products/Applications/*.app Payload/
          
          # Zip the Payload folder to create the .ipa
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-unsigned-ipa
          path: ios/build/app.ipa

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log
          # This captures the log even if it failed at the archive stage
          path: ios/build_output.log