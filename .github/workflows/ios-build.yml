name: iOS Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true 

      - name: Install Dependencies
        run: npm install

      - name: Prebuild iOS Folder
        # Using --no-install so we can patch the Podfile BEFORE pods are installed
        run: npx expo prebuild --platform ios --no-install
        env:
          CI: true

      - name: Patch Podfile for Xcode 16
        run: |
          # This command injects the ENABLE_USER_SCRIPT_SANDBOXING fix 
          # directly into the generated Podfile's post_install block.
          sed -i '' "s/post_install do |installer|/post_install do |installer|\\
            installer.pods_project.targets.each do |target|\\
              target.build_configurations.each do |config|\\
                config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'\\
              end\\
            end/" ios/Podfile
          
          # Now install the pods with the patched settings
          cd ios && pod install && cd ..

      - name: Run Fastlane Build
        run: bundle exec fastlane build_sideload
        env:
          CI: true
          NODE_ENV: production

      - name: Stage and Zip App Bundle
        run: |
          APP_PATH=$(find ./derived_data -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "App not found"; exit 1; fi
          mkdir -p ./output/Payload
          cp -R "$APP_PATH" ./output/Payload/Nuvix+.app
          cd output && zip -r Nuvix-Plus-Build.zip Payload/ && cd ..

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-Plus-Sideload-Ready
          path: ./output/Nuvix-Plus-Build.zip