name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        id: build_step
        run: |
          cd ios
          set -o pipefail
          xcodebuild archive \
            -workspace Nuvixapp.xcworkspace \
            -scheme Nuvixapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO | tee ../xcodebuild_error.log

      - name: Upload Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Crash-Log
          path: xcodebuild_error.log

      - name: Package into .ipa
        if: success()
        run: |
          mkdir -p Payload
          APP_DIR=$(find . -name "*.app" -type d | grep "Release-iphoneos" || find . -name "*.app" -type d | head -n 1)
          cp -R "$APP_DIR" Payload/
          zip -r Nuvixapp_unsigned.ipa Payload

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nuvixapp-Unsigned-Package
          path: Nuvixapp_unsigned.ipa