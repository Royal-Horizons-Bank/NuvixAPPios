name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        run: |
          cd ios
          # Hardcoded exactly to the Capital 'N' from your app.json
          xcodebuild archive \
            -workspace Nuvixapp.xcworkspace \
            -scheme Nuvixapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into .ipa
        run: |
          cd ios
          mkdir -p Payload
          
          # Find the .app and copy it
          APP_DIR=$(find . -name "*.app" -type d | grep "Release-iphoneos" || find . -name "*.app" -type d | head -n 1)
          echo "Found App at: $APP_DIR"
          
          cp -R "$APP_DIR" Payload/
          zip -r Nuvixapp_unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvixapp-Unsigned-Package
          path: ios/Nuvixapp_unsigned.ipa