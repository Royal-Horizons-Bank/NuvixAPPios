name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        run: |
          cd ios
          # Use pipefail so the script stops if Xcode crashes
          set -o pipefail
          xcodebuild archive \
            -workspace Nuvixapp.xcworkspace \
            -scheme Nuvixapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Nuvixapp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_COMPILATION_MODE=wholemodule

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          # Search the ENTIRE runner for the .app folder created during the build
          # This bypasses the "No such file or directory" error for the archive folder
          APP_PATH=$(find . -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
             echo "Fallback search for .app..."
             APP_PATH=$(find . -name "Nuvixapp.app" -type d | head -n 1)
          fi
          
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r Nuvixapp_unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvixapp-Final-IPA
          path: Nuvixapp_unsigned.ipa