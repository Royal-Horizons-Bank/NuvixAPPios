name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Generate Native iOS Code (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Build Unsigned Archive
        run: |
          cd ios
          # 1. Automatically detect the scheme name
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.workspace.schemes[0]')
          echo "Detected Scheme: $SCHEME_NAME"
          
          # 2. Build using the detected scheme
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build_output.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          # Search everywhere for the .app folder generated
          APP_PATH=$(find . -name "*.app" -type d | grep "Release-iphoneos" || find . -name "*.app" -type d | head -n 1)
          echo "Packing app from: $APP_PATH"
          
          cp -R "$APP_PATH" Payload/
          zip -r nuvix_build.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-App-Final
          path: nuvix_build.ipa