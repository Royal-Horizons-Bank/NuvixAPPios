name: iOS Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true 

      - name: Install Dependencies
        run: npm install

      - name: Prebuild iOS Folder
        run: npx expo prebuild --platform ios

      - name: Debug - Find Workspace Name
        run: |
          echo "Looking inside the iOS folder..."
          ls -la ios/ | grep .xcworkspace
      
      # This will find the correct path automatically

      - name: Fix Expo Constants
        run: npx expo export --platform ios

      - name: Run Fastlane Build
        run: bundle exec fastlane build_sideload
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
          # This forces Expo to skip some of the "phone home" checks during build
          NODE_ENV: production

      - name: Locate and Rename .app Bundle
        run: |
          APP_PATH=$(find ./derived_data -name "Nuvix.app" -type d | head -n 1)
          mkdir -p ./output
          cp -R "$APP_PATH" ./output/Nuvix+.app
          echo "App bundle is at ./output/Nuvix+.app"

      - name: Upload .app Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuvix-Plus-App-Bundle
          path: ./output/Nuvix+.app
          
      - name: Find and Stage App Bundle
        run: |
          mkdir -p build-output
          # The .app lives inside the .xcarchive
          find ~/Library/Developer/Xcode/Archives -name "*.app" -type d -exec cp -R {} ./build-output/ \;
          
          echo "Checking if we found the app..."
          ls -R build-output

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: App-Bundle
          path: build-output/